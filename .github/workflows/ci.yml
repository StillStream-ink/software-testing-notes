name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install pytest playwright allure-pytest
          playwright install --with-deps chromium

      - name: Debug directory structure
        run: |
          echo "=== 当前目录 ==="
          pwd
          echo "=== 根目录文件列表 ==="
          ls -la
          echo "=== tests/ 目录 ==="
          ls -la tests/ || echo "tests/ 不存在"
          echo "=== 第三周_web_auto_po/tests/ 目录 ==="
          ls -la 第三周_web_auto_po/tests/ || echo "第三周_web_auto_po/tests/ 不存在"

      - name: Run tests
        run: |
          cd 第三周_web_auto_po
          pytest tests/test_saucedemo_po.py -v --alluredir=./allure-results --clean-alluredir

      - name: Copy environment properties
        run: |
          cd 第三周_web_auto_po
          cp environment.properties allure-results/

      - name: Generate Allure Report
        run: |
          cd 第三周_web_auto_po
          npm install -g allure-commandline
          allure generate allure-results -o allure-report --clean
      
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: 第三周_web_auto_po/allure-results

      - name: Generate Allure Report
        run: |
          cd 第三周_web_auto_po
          npm install -g allure-commandline
          allure generate allure-results -o allure-report --clean

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./第三周_web_auto_po/allure-report
          destination_dir: allure-report
          keep_files: false




        
